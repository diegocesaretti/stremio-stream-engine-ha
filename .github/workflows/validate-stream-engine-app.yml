name: Build and publish Stream Server App

on:
  push:
    branches:
      - main
    paths:
      - "repository.yaml"
      - "stream_server/**"
      - ".github/workflows/validate-stream-engine-app.yml"
  pull_request:
    branches:
      - main
    paths:
      - "repository.yaml"
      - "stream_server/**"
      - ".github/workflows/validate-stream-engine-app.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: diegocesaretti/stream-server-home-assistant

jobs:
  build:
    name: Build and test ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate metadata and read version
        id: metadata
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check pyyaml
          python - <<'PY'
          from pathlib import Path
          import yaml

          paths = [Path("repository.yaml"), *Path("stream_server").rglob("*.yaml")]
          for path in paths:
              with path.open(encoding="utf-8") as stream:
                  yaml.safe_load(stream)
              print(f"Validated {path}")

          with Path("stream_server/config.yaml").open(encoding="utf-8") as stream:
              config = yaml.safe_load(stream)
          print(f"version={config['version']}")
          with Path("version.txt").open("w", encoding="utf-8") as stream:
              stream.write(str(config["version"]))
          PY
          echo "version=$(cat version.txt)" >> "$GITHUB_OUTPUT"
          bash -n stream_server/run.sh

      - name: Build ${{ matrix.arch }} app image
        id: docker_build
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          docker build \
            --build-arg BUILD_VERSION=${{ steps.metadata.outputs.version }} \
            --build-arg BUILD_ARCH=${{ matrix.arch }} \
            --tag stream-server-home-assistant:${{ matrix.arch }} \
            stream_server >docker-build-${{ matrix.arch }}.log 2>&1

      - name: Upload Docker build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-build-log-${{ matrix.arch }}
          path: docker-build-${{ matrix.arch }}.log
          if-no-files-found: error
          retention-days: 7

      - name: Report Docker build failure
        if: steps.docker_build.outcome == 'failure'
        shell: bash
        run: |
          echo "Docker build failed. Last 120 lines:"
          tail -n 120 docker-build-${{ matrix.arch }}.log
          exit 1

      - name: Inspect image
        if: steps.docker_build.outcome == 'success'
        run: docker image inspect stream-server-home-assistant:${{ matrix.arch }} >/dev/null

      - name: Smoke test HTTP API
        id: smoke_test
        if: steps.docker_build.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          DATA_DIR="${RUNNER_TEMP}/stream-server-home-assistant-${{ matrix.arch }}"
          LOG_FILE="docker-runtime-${{ matrix.arch }}.log"
          CONTAINER_NAME="stream-server-home-assistant-${{ matrix.arch }}-test"
          mkdir -p "${DATA_DIR}"
          printf '%s\n' '{"log_level":"info"}' >"${DATA_DIR}/options.json"

          cleanup() {
            docker logs "${CONTAINER_NAME}" >"${LOG_FILE}" 2>&1 || true
            docker rm -f "${CONTAINER_NAME}" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          docker run --detach \
            --name "${CONTAINER_NAME}" \
            --publish 11470:11470 \
            --volume "${DATA_DIR}:/data" \
            stream-server-home-assistant:${{ matrix.arch }} >/dev/null

          for _ in $(seq 1 60); do
            if curl --fail --silent --show-error \
              http://127.0.0.1:11470/heartbeat >heartbeat.json; then
              cat heartbeat.json
              exit 0
            fi
            if [[ "$(docker inspect --format '{{.State.Running}}' "${CONTAINER_NAME}")" != "true" ]]; then
              echo "Container exited before the heartbeat endpoint became ready"
              exit 1
            fi
            sleep 2
          done

          echo "Heartbeat endpoint did not become ready within 120 seconds"
          exit 1

      - name: Upload runtime log
        if: always() && steps.docker_build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: docker-runtime-log-${{ matrix.arch }}
          path: docker-runtime-${{ matrix.arch }}.log
          if-no-files-found: warn
          retention-days: 7

      - name: Report smoke-test failure
        if: steps.smoke_test.outcome == 'failure'
        shell: bash
        run: |
          echo "Container smoke test failed:"
          cat docker-runtime-${{ matrix.arch }}.log || true
          exit 1

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request' && steps.smoke_test.outcome == 'success'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push architecture image
        if: github.event_name != 'pull_request' && steps.smoke_test.outcome == 'success'
        shell: bash
        run: |
          REMOTE_IMAGE="${REGISTRY}/${IMAGE_NAME}:${{ steps.metadata.outputs.version }}-${{ matrix.arch }}"
          docker tag stream-server-home-assistant:${{ matrix.arch }} "${REMOTE_IMAGE}"
          docker push "${REMOTE_IMAGE}"

  manifest:
    name: Publish multi-architecture manifest
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Read app version
        id: metadata
        shell: bash
        run: |
          VERSION="$(python - <<'PY'
          from pathlib import Path
          import re

          content = Path("stream_server/config.yaml").read_text(encoding="utf-8")
          match = re.search(r'^version:\s*["\x27]?([^"\x27\s]+)', content, re.MULTILINE)
          if not match:
              raise SystemExit("Unable to read app version")
          print(match.group(1))
          PY
          )"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish versioned and latest manifests
        shell: bash
        run: |
          VERSION="${{ steps.metadata.outputs.version }}"
          IMAGE="${REGISTRY}/${IMAGE_NAME}"
          docker buildx imagetools create \
            --tag "${IMAGE}:${VERSION}" \
            --tag "${IMAGE}:latest" \
            "${IMAGE}:${VERSION}-amd64" \
            "${IMAGE}:${VERSION}-aarch64"
          docker buildx imagetools inspect "${IMAGE}:${VERSION}"
