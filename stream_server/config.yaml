name: Stremio Stream Engine
version: "0.1.0"
slug: stremio_stream_engine
description: >-
  Local Stremio-compatible torrent streaming engine for Stremio Stream Bridge.
url: https://github.com/diegocesaretti/stream-server-home-assistant
arch:
  - aarch64
  - amd64
startup: services
boot: auto
init: false
ports:
  11470/tcp: 11470
ports_description:
  11470/tcp: Stremio-compatible HTTP API
webui: http://[HOST]:[PORT:11470]/
watchdog: http://[HOST]:[PORT:11470]/heartbeat
map:
  - type: addon_config
    read_only: false
options:
  log_level: info
schema:
  log_level: list(trace|debug|info|warn|error)
apparmor: false
