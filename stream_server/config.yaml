name: Stream Server for Home Assistant
version: "0.3.0"
slug: stream_server_home_assistant
description: >-
  Local Stremio-compatible torrent stream server for Stremio Stream Bridge.
url: https://github.com/diegocesaretti/stream-server-home-assistant
image: ghcr.io/diegocesaretti/stream-server-home-assistant
arch:
  - aarch64
  - amd64
startup: services
boot: auto
init: false
ports:
  11470/tcp: 11470
ports_description:
  11470/tcp: Stremio-compatible HTTP API
webui: http://[HOST]:[PORT:11470]/
watchdog: http://[HOST]:[PORT:11470]/heartbeat
map:
  - type: addon_config
    read_only: false
options:
  log_level: info
schema:
  log_level: list(trace|debug|info|warn|error)
apparmor: false
